<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1264" height="886" contentStyleType="text/css" preserveAspectRatio="none" style="width:1264px;height:886px;background:#fff" version="1.1" viewBox="0 0 1264 886" zoomAndPan="magnify"><g><text x="519.367" y="22.995" fill="#000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="211.415">Local Query State Machine</text><ellipse cx="799.39" cy="53.297" fill="#222" rx="10" ry="10" style="stroke:#222;stroke-width:1"/><g id="uninitialized"><rect width="354.981" height="78.203" x="621.9" y="124.297" fill="#F1F1F1" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:.5"/><line style="stroke:#181818;stroke-width:.5" x1="621.9" x2="976.88" y1="150.594" y2="150.594"/><text x="756.898" y="142.292" fill="#000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="84.984">uninitialized</text><text x="626.9" y="166.732" fill="#000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="334.981">The initial query state from a C.41-noncompliant query.</text><text x="626.9" y="180.701" fill="#000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="330.744">The &quot;ready&quot; event is only necessary to compensate for</text><text x="626.9" y="194.67" fill="#000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="160.371">the existence of this state.</text></g><path fill="#F1F1F1" d="M345.26,279.4969 L701.5217,279.4969 A12.5,12.5 0 0 1 714.0217,291.9969 L714.0217,366.6688 L332.76,366.6688 L332.76,291.9969 A12.5,12.5 0 0 1 345.26,279.4969" style="stroke:#f1f1f1;stroke-width:1"/><rect width="381.262" height="318.172" x="332.76" y="279.497" fill="none" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:.5"/><line style="stroke:#181818;stroke-width:.5" x1="332.76" x2="714.022" y1="366.669" y2="366.669"/><line style="stroke:#181818;stroke-width:.5" x1="332.76" x2="714.022" y1="305.794" y2="305.794"/><text x="467.904" y="297.492" fill="#000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="110.975">everything_else</text><text x="337.76" y="316.932" fill="#000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="345.352">This state represents an initialized query that has not yet</text><text x="337.76" y="330.901" fill="#000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="353.525">reached a final state. Its internal state is not yet modelled,</text><text x="337.76" y="344.87" fill="#000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="356.262">so the inner state machine should be treated as illustrative</text><text x="337.76" y="358.839" fill="#000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="144.316">only and not normative.</text><ellipse cx="392.64" cy="387.669" fill="#222" rx="10" ry="10" style="stroke:#222;stroke-width:1"/><g id="everything_else.initialized"><rect width="87.238" height="50" x="349.02" y="434.669" fill="#F1F1F1" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:.5"/><line style="stroke:#181818;stroke-width:.5" x1="349.02" x2="436.258" y1="460.966" y2="460.966"/><text x="359.02" y="452.664" fill="#000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="67.238">initialized</text></g><g id="everything_else.processing"><rect width="95.756" height="50" x="344.76" y="537.669" fill="#F1F1F1" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:.5"/><line style="stroke:#181818;stroke-width:.5" x1="344.76" x2="440.516" y1="563.966" y2="563.966"/><text x="354.76" y="555.664" fill="#000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="75.756">processing</text></g><g id="everything_else.in_progress"><rect width="100.814" height="50" x="514.23" y="537.669" fill="#F1F1F1" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:.5"/><