181818;stroke-width:1"/><text x="455.37" y="578.736" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="44.637">submit</text></g><g id="aborted"><rect width="198.781" height="64.234" x="7" y="674.667" fill="#F1F1F1" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:.5"/><line style="stroke:#181818;stroke-width:.5" x1="7" x2="205.781" y1="700.964" y2="700.964"/><text x="79.002" y="692.662" fill="#000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="54.776">aborted</text><text x="12" y="717.102" fill="#000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="173.56">The query failed to complete</text><text x="12" y="731.071" fill="#000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="178.781">because of a resource failure.</text></g><g id="cancelled"><rect width="187.56" height="64.234" x="795.61" y="674.667" fill="#F1F1F1" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:.5"/><line style="stroke:#181818;stroke-width:.5" x1="795.61" x2="983.17" y1="700.964" y2="700.964"/><text x="856.021" y="692.662" fill="#000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="66.739">cancelled</text><text x="800.61" y="717.102" fill="#000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="167.56">The query was cancelled by</text><text x="800.61" y="731.071" fill="#000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="166.957">the user before completion.</text></g><g id="error"><rect width="191.82" height="64.234" x="647.48" y="815.907" fill="#F1F1F1" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:.5"/><line style="stroke:#181818;stroke-width:.5" x1="647.48" x2="839.3" y1="842.204" y2="842.204"/><text x="726.167" y="833.902" fill="#000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="34.446">error</text><text x="652.48" y="858.342" fill="#000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="171.82">The state machine was used</text><text x="652.48" y="872.311" fill="#000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="157.424">incorrectly by query code.</text></g><g id="success"><rect width="199.672" height="64.234" x="400.55" y="674.667" fill="#F1F1F1" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:.5"/><line style="stroke:#181818;stroke-width:.5" x1="400.55" x2="600.222" y1="700.964" y2="700.964"/><text x="473.005" y="692.662" fill="#000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="54.763">success</text><text x="405.55" y="717.102" fill="#000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="179.672">The query completed and has</text><text x="405.55" y="731.071" fill="#000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="136.201">returned all its results.</text></g><g id="link_*start*_uninitialized"><path id="*start*-to-uninitialized" fill="none" d="M799.39,63.5069 C799.39,76.8869 799.39,96.4669 799.39,118.2569" style="stroke:#181818;stroke-width:1"/><polygon fill="#181818" points="799.39 124.257 803.39 115.257 799.39 119.257 795.39 115.257 799.39 124.257" style="stroke:#181818;stroke-width:1"/></g><g id="link_uninitialized_everything_else"><path id="uninitialized-to-everything_else" fill="none" d="M760.43,202.9569 C739.48,223.6969 716.3541,246.5858 687.6641,274.9858" style="stroke:#181818;stroke-width:1"/><polygon fill="#181818" points="683.4 279.207 692.61 275.718 686.953 275.689 686.982 270.033 683.4 279.207" style="stroke:#181818;stroke-width:1"/><text x="725.39" y="245.564" fill="#000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="37.254">ready</text></g><g id="link_uninitialized_aborted"><path id="uninitialized-to-aborted" fill="none" d="M621.43,185.8969 C492,204.7869 330.82,236.0469 279.39,279.4969 C154.32,385.1769 119.315,588.9973 1